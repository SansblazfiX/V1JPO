<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Badge — JPO Albert Camus</title>
<link rel="stylesheet" href="style-global.css">
<style>
body { background: linear-gradient(135deg, #fbbf24 0%, #f97316 50%, #ef4444 100%); min-height: 100vh; }

.badge-wrapper {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
}

/* Confettis */
.confetti-piece {
  position: fixed; border-radius: 50%;
  animation: confetti linear infinite;
  pointer-events: none;
}
@keyframes confetti {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Badge diplôme */
.diplome {
  background: white; border-radius: 28px; padding: 36px 28px;
  width: 100%; max-width: 500px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  text-align: center; position: relative; overflow: hidden;
  animation: popIn .6s .2s ease both;
}

/* Bordure décorative */
.diplome::before {
  content: ''; position: absolute; inset: 8px;
  border: 3px dashed rgba(251,191,36,.4);
  border-radius: 22px; pointer-events: none;
}

.diplome-header {
  font-family: 'Nunito', sans-serif; font-size: .65rem; font-weight: 800;
  letter-spacing: 3px; text-transform: uppercase; color: #9ca3af;
  margin-bottom: 16px;
}

.diplome-stars { font-size: 1.5rem; margin-bottom: 12px; animation: wiggle 1s ease-in-out infinite; }

.diplome-badge {
  width: 100px; height: 100px; margin: 0 auto 16px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 3rem; animation: popIn .5s .4s ease both;
  box-shadow: 0 8px 30px rgba(0,0,0,.15);
}

.diplome-title {
  font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700;
  color: #6b7280; text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 6px;
}
.diplome-name {
  font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800;
  color: #1a1a2e; margin-bottom: 4px; line-height: 1.2;
}
.diplome-sub {
  font-size: .82rem; color: #9ca3af; margin-bottom: 20px; font-weight: 600;
}

/* Score total */
.score-strip {
  display: flex; justify-content: center; gap: 16px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.score-chip {
  border-radius: 12px; padding: 10px 16px; text-align: center;
  flex: 1; min-width: 80px;
}
.score-chip-num { font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 800; }
.score-chip-lbl { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: .8; }

/* Mention */
.mention {
  display: inline-block; padding: 8px 24px; border-radius: 30px;
  font-family: 'Baloo 2', cursive; font-weight: 800; font-size: .95rem;
  margin-bottom: 20px; animation: popIn .5s .6s ease both;
}

/* Salles visitées */
.salles-row {
  display: flex; gap: 8px; justify-content: center;
  margin-bottom: 20px; flex-wrap: wrap;
}
.salle-chip {
  border-radius: 10px; padding: 6px 12px;
  font-size: .72rem; font-weight: 700;
  display: flex; align-items: center; gap: 5px;
}

.diplome-footer {
  font-size: .72rem; color: #9ca3af; font-weight: 600;
  border-top: 1px dashed #e5e7eb; padding-top: 14px;
  margin-top: 4px;
}

/* Boutons */
.btns-row { display: flex; gap: 10px; flex-direction: column; width: 100%; max-width: 500px; margin-top: 20px; }
.btn-share {
  display: block; width: 100%; padding: 16px;
  background: white; border: none; border-radius: 16px;
  font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
  color: #f97316; cursor: pointer; text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.15); transition: all .2s;
}
.btn-share:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.2); }
.btn-restart {
  display: block; width: 100%; padding: 14px;
  background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.5);
  border-radius: 16px; font-family: 'Baloo 2', cursive; font-size: .9rem; font-weight: 800;
  color: white; cursor: pointer; text-align: center; text-decoration: none;
  transition: all .2s;
}
.btn-restart:hover { background: rgba(255,255,255,.3); }
</style>
</head>
<body>

<!-- Confettis -->
<div id="confetti-wrap"></div>

<div class="badge-wrapper">

  <div class="diplome" id="diplome">
    <div class="diplome-header">🎓 Lycée Albert Camus · Firminy · JPO 2025</div>
    <div class="diplome-stars" id="stars">⭐⭐⭐</div>

    <div class="diplome-badge" id="badge-icon" style="background:#fef3c7">🏆</div>

    <div class="diplome-title">Certificat de Visite</div>
    <div class="diplome-name" id="badge-title">Explorateur du Lycée</div>
    <div class="diplome-sub">A complété le parcours découverte de la JPO</div>

    <div class="score-strip" id="score-strip"></div>

    <div class="mention" id="mention">🥇 Mention Excellent</div>

    <div class="salles-row">
      <div class="salle-chip" style="background:#dbeafe;color:#1d4ed8">📚 CDI</div>
      <div class="salle-chip" style="background:#d1fae5;color:#047857">🔬 Sciences</div>
      <div class="salle-chip" style="background:#ffedd5;color:#c2410c">💼 Pôle Pro</div>
      <div class="salle-chip" style="background:#ede9fe;color:#6d28d9">🏃 Gymnase</div>
    </div>

    <div class="diplome-footer">
      Journée Portes Ouvertes · Lycée Albert Camus · 3205 Rue de la Loire, 42700 Firminy
    </div>
  </div>

  <div class="btns-row">
    <button class="btn-share" onclick="printBadge()">🖨️ Imprimer mon badge</button>
    <a href="index.html" class="btn-restart" onclick="resetScore()">↺ Recommencer la visite</a>
  </div>

</div>

<script src="script.js"></script>
<script>
const s = getScore();
const total = totalScore();
const max = 120; // 3 questions × 10 pts × 4 salles

// Confettis
const colors = ['#fbbf24','#10b981','#3b82f6','#f97316','#8b5cf6','#ef4444'];
const wrap = document.getElementById('confetti-wrap');
for (let i = 0; i < 60; i++) {
  const p = document.createElement('div');
  p.className = 'confetti-piece';
  p.style.cssText = `
    left:${Math.random()*100}%;
    width:${6+Math.random()*8}px;
    height:${6+Math.random()*8}px;
    background:${colors[~~(Math.random()*colors.length)]};
    border-radius:${Math.random()>.5?'50%':'3px'};
    animation-duration:${2.5+Math.random()*3}s;
    animation-delay:${Math.random()*3}s;
  `;
  wrap.appendChild(p);
}

// Mention et badge selon score
const pct = total / max * 100;
let mention, badgeIcon, badgeTitle, stars, badgeBg;

if (pct === 100) {
  mention = '🥇 Mention Parfaite !';
  badgeIcon = '🏆'; badgeTitle = 'Champion du Lycée';
  stars = '⭐⭐⭐'; badgeBg = '#fef3c7';
} else if (pct >= 75) {
  mention = '🥈 Mention Très Bien';
  badgeIcon = '🌟'; badgeTitle = 'Expert du Lycée';
  stars = '⭐⭐⭐'; badgeBg = '#e0f2fe';
} else if (pct >= 50) {
  mention = '🥉 Mention Bien';
  badgeIcon = '😊'; badgeTitle = 'Explorateur du Lycée';
  stars = '⭐⭐'; badgeBg = '#d1fae5';
} else {
  mention = '🎖️ Mention Encouragement';
  badgeIcon = '💪'; badgeTitle = 'Visiteur du Lycée';
  stars = '⭐'; badgeBg = '#ede9fe';
}

document.getElementById('stars').textContent = stars;
document.getElementById('badge-icon').textContent = badgeIcon;
document.getElementById('badge-icon').style.background = badgeBg;
document.getElementById('badge-title').textContent = badgeTitle;
document.getElementById('mention').textContent = mention;

// Mention couleur
const mentionEl = document.getElementById('mention');
if (pct===100)      { mentionEl.style.background='#fef3c7'; mentionEl.style.color='#92400e'; }
else if (pct>=75)   { mentionEl.style.background='#dbeafe'; mentionEl.style.color='#1d4ed8'; }
else if (pct>=50)   { mentionEl.style.background='#d1fae5'; mentionEl.style.color='#065f46'; }
else                { mentionEl.style.background='#ede9fe'; mentionEl.style.color='#6d28d9'; }

// Score strip
const SALLES_INFO = [
  {id:'cdi', label:'CDI', icon:'📚', color:'#dbeafe', tc:'#1d4ed8'},
  {id:'sci', label:'Sciences', icon:'🔬', color:'#d1fae5', tc:'#047857'},
  {id:'stmg',label:'Pôle Pro', icon:'💼', color:'#ffedd5', tc:'#c2410c'},
  {id:'gym', label:'Gymnase',  icon:'🏃', color:'#ede9fe', tc:'#6d28d9'},
];
document.getElementById('score-strip').innerHTML = SALLES_INFO.map(sl => `
  <div class="score-chip" style="background:${sl.color};color:${sl.tc}">
    <div class="score-chip-num">${sl.icon} ${s[sl.id]||0}</div>
    <div class="score-chip-lbl">${sl.label}</div>
  </div>
`).join('') + `
  <div class="score-chip" style="background:#1a1a2e;color:white">
    <div class="score-chip-num">⭐ ${total}</div>
    <div class="score-chip-lbl">Total / ${max}</div>
  </div>
`;

function printBadge() { window.print(); }
</script>
</body>
</html>
